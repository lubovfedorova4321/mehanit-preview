<style>
:root{--ink:#24272b;--mid:#6f7479;--line:rgba(36,39,43,.11);--purple:#6b2d8b;--gold:#c9a227;--paper:#f3f4f3}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:'Golos Text',sans-serif}a{color:inherit;text-decoration:none}button{font:inherit}
.wrap{width:min(100% - 56px,1440px);margin:auto}.hdr{position:sticky;top:0;z-index:20;background:rgba(248,248,246,.82);border-bottom:1px solid rgba(255,255,255,.6);backdrop-filter:blur(22px)}.nav{min-height:82px;display:flex;align-items:center;gap:30px}.brand img{display:block;height:54px}.menu{display:flex;align-items:center;gap:24px;margin-left:auto}.menu a{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.65px}.menu a:hover,.menu a.active{color:var(--purple)}.phone{font-size:15px;font-weight:700;margin-left:12px}
.hero{position:relative;overflow:hidden;padding:104px 0 72px;background:linear-gradient(130deg,#fbfbfa 0%,#f1f2f2 58%,#e4e6e7 100%)}.hero::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(107,45,139,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(107,45,139,.04) 1px,transparent 1px);background-size:72px 72px;mask-image:linear-gradient(90deg,#000,transparent 76%);pointer-events:none}.hero .wrap{position:relative;z-index:1}.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:22px}.hero h1{margin:0;max-width:950px;font-family:'Unbounded',sans-serif;font-size:clamp(40px,5.2vw,76px);font-weight:400;line-height:1.02;letter-spacing:-.055em}.hero h1 span{display:block;color:#74797e;font-weight:300}.hero p{max-width:690px;margin:28px 0 0;font-size:18px;line-height:1.65;color:var(--mid)}
.news{padding:72px 0 100px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}.card{appearance:none;width:100%;padding:0;border:1px solid var(--line);background:rgba(255,255,255,.82);text-align:left;color:inherit;cursor:pointer;overflow:hidden;box-shadow:0 18px 48px rgba(31,34,37,.06);transition:.25s}.card:hover{transform:translateY(-5px);border-color:rgba(107,45,139,.24);box-shadow:0 28px 62px rgba(31,34,37,.11)}.media{height:230px;overflow:hidden;background:#dfe2e4}.media img,.media video{width:100%;height:100%;display:block;object-fit:cover;filter:saturate(.76) contrast(.96);transition:.35s}.card:hover .media img,.card:hover .media video{transform:scale(1.035);filter:saturate(.9) contrast(1.02)}.content{padding:25px 25px 27px}.content small{display:block;margin-bottom:13px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.45px;text-transform:uppercase;color:var(--purple)}.content h2{min-height:70px;margin:0 0 12px;font-family:'Unbounded',sans-serif;font-size:18px;font-weight:500;line-height:1.28;letter-spacing:-.035em}.content p{min-height:66px;margin:0;color:var(--mid);font-size:13px;line-height:1.65}.open{display:inline-block;margin-top:19px;font-size:12px;font-weight:700;color:var(--purple)}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(22,24,27,.58);backdrop-filter:blur(12px)}.modal.open{display:flex}.dialog{position:relative;width:min(900px,100%);max-height:90vh;overflow:auto;background:#f8f8f6;box-shadow:0 35px 100px rgba(0,0,0,.3)}.close{position:absolute;right:16px;top:14px;z-index:2;width:42px;height:42px;border:0;background:rgba(255,255,255,.86);font-size:28px;cursor:pointer}.modal-media{height:360px;background:#ddd}.modal-media img,.modal-media video{width:100%;height:100%;display:block;object-fit:cover}.modal-copy{padding:34px 38px 42px}.modal-copy small{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--purple);text-transform:uppercase}.modal-copy h2{margin:14px 0 24px;font-family:'Unbounded',sans-serif;font-size:clamp(25px,3vw,38px);line-height:1.18;letter-spacing:-.045em}.modal-copy p{font-size:15px;line-height:1.75;color:#555b60}.footer{padding:32px 0;background:#26292d;color:rgba(255,255,255,.65);font-size:13px}.footer .wrap{display:flex;justify-content:space-between;gap:20px}.footer a{color:#fff}
@media(max-width:1050px){.menu{display:none}.phone{margin-left:auto}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:680px){.wrap{width:min(100% - 30px,1440px)}.brand img{height:44px}.phone{font-size:12px}.hero{padding:72px 0 54px}.grid{grid-template-columns:1fr}.media{height:210px}.modal-copy{padding:28px 22px 34px}.modal-media{height:230px}.footer .wrap{display:block}.footer a{display:block;margin-top:10px}}
</style>
</head>
<body>
<header class="hdr"><div class="wrap nav"><a class="brand" href="index.html"><img src="mehanit-logo-cropped.png" alt="Механит"/></a><nav class="menu"><a href="index.html#equipment">Оборудование</a><a href="index.html#solutions">Решения</a><a href="index.html#stock">Склад в РФ</a><a href="production-equipment.html">Комплексный подход</a><a class="active" href="press.html">Пресс-центр</a><a href="contacts.html">Контакты</a></nav><a class="phone" href="tel:88005511206">8 800 55 11 206</a></div></header>
<main>
<section class="hero"><div class="wrap"><div class="eyebrow">Пресс-центр Механит</div><h1>Новости компании<span>внедрения, выставки, проекты</span></h1><p>Рассказываем о запусках оборудования, инженерных решениях и ключевых отраслевых событиях.</p></div></section>
<section class="news"><div class="wrap"><div class="grid" id="newsGrid"></div></div></section>
</main>
<footer class="footer"><div class="wrap"><span>© 2026 ООО ГК «Механит»</span><a href="mailto:info@mehanit.ru">info@mehanit.ru</a></div></footer>
<div class="modal" id="articleModal" aria-hidden="true"><article class="dialog" role="dialog" aria-modal="true" aria-labelledby="articleTitle"><button class="close" type="button" aria-label="Закрыть">×</button><div class="modal-media" id="articleMedia"></div><div class="modal-copy"><small id="articleKicker"></small><h2 id="articleTitle"></h2><div id="articleBody"></div></div></article></div>
<script>
const articles=[
{id:'ck5116',kicker:'Внедрение · 26.02.2026',title:'Токарно-карусельный станок CK5116 для локомотиворемонтного предприятия',image:'stock-warehouse-cnc.png',lead:'Запуск решения для обработки бандажей колесных пар: диаметр до 1600 мм, заготовки до 5000 кг.',body:['Механит подготовил решение для локомотиворемонтного предприятия, где ключевая задача связана с обработкой крупногабаритных деталей колесных пар.','В проекте сделан акцент на жесткость станка, стабильность геометрии и возможность работать с заготовками до 5000 кг.','Задача Механит в таких проектах — связать оборудование, технологию, оснастку, запуск и дальнейшее сервисное сопровождение.']},
{id:'auto',kicker:'Внедрение · 24.11.2025',title:'Вертикально-фрезерное оборудование для предприятия автокомпонентов',image:'mehanit-milling-machine.jpg',lead:'Оборудование для корпусных деталей, фланцев, ступиц и элементов мостов.',body:['Проект сфокусирован на обработке корпусных деталей, фланцев, ступиц и элементов мостов.','Для таких задач критичны повторяемость, скорость переналадки, корректный подбор инструмента и стабильный техпроцесс.','Итоговый подход включает подбор конфигурации станка, инструментального комплекта, оснастки и сценария запуска под реальную серию деталей.']},
{id:'grinding',kicker:'Внедрение · 10.12.2025',title:'Плоскошлифовальный комплекс для цветной металлургии',image:'task-grinding.jpg',lead:'Финишная обработка деталей с требованиями к шероховатости, плоскостности и стабильности цикла.',body:['Плоскошлифовальное оборудование используется там, где важны поверхность, плоскостность и повторяемость результата.','Для предприятий цветной металлургии особенно важны стабильность финишной обработки и контроль теплового влияния.','Механит помогает подобрать решение под материал, габариты, допуски и требования к серийному циклу.']},
{id:'mashexpo',kicker:'Выставка · 20.01.2026',title:'Механит на МашЭкспо Сибирь 2026',image:'modal-machine-bg.png',lead:'Подбор станков под допуски и задачи, оптимизация технологии, решения под ключ.',body:['Механит представил инженерный подход к подбору металлообрабатывающего оборудования: от анализа детали до запуска производства.','На выставке обсуждались задачи по токарной, фрезерной, шлифовальной и электроэрозионной обработке.','Фокус коммуникации — подбор производственного решения под материал, допуск, партию и экономику проекта.']},
{id:'mashexpo-results',kicker:'Итоги · 12.03.2026',title:'Итоги МашЭкспо Сибирь',image:'mehanit-hero-cnc-poster.jpg',lead:'Десятки встреч с промышленными предприятиями и новые проекты по внедрению оборудования.',body:['Выставка дала Механит несколько дней интенсивной работы с промышленными предприятиями и инженерными командами.','Ключевые запросы касались сроков поставки, складского оборудования, подбора технологии, лизинга и запуска первой детали.','Полученные задачи перешли в проектную работу: технологический анализ, подбор конфигураций и подготовку КП.']},
{id:'metal2026',kicker:'Выставка · 12.05.2026',title:'Металлообработка-2026: первый день',image:'mehanit-hero-cnc-poster.jpg',lead:'Оборудование, инженерные решения, складские станки, Macro Tools и консультации по внедрению.',body:['Механит представил на отраслевой выставке оборудование, инженерные решения, складские станки и направление Macro Tools.','Главный акцент — комплексный подход: станок, технология, инструмент, оснастка, ПНР, обучение и сервис.','Команда разбирала производственные задачи и показывала, как подбор оборудования начинается с детали.']}
];
const grid=document.getElementById('newsGrid');
grid.innerHTML=articles.map(a=>`<button class="card" type="button" data-id="${a.id}"><div class="media"><img src="${a.image}" alt="${a.title}"/></div><div class="content"><small>${a.kicker}</small><h2>${a.title}</h2><p>${a.lead}</p><span class="open">Открыть статью →</span></div></button>`).join('');
const modal=document.getElementById('articleModal');
function closeArticle(){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');document.body.style.overflow=''}
grid.addEventListener('click',e=>{const card=e.target.closest('.card');if(!card)return;const a=articles.find(x=>x.id===card.dataset.id);if(!a)return;document.getElementById('articleMedia').innerHTML=`<img src="${a.image}" alt="${a.title}"/>`;document.getElementById('articleKicker').textContent=a.kicker;document.getElementById('articleTitle').textContent=a.title;document.getElementById('articleBody').innerHTML=a.body.map(p=>`<p>${p}</p>`).join('');modal.classList.add('open');modal.setAttribute('aria-hidden','false');document.body.style.overflow='hidden'});
modal.querySelector('.close').addEventListener('click',closeArticle);modal.addEventListener('click',e=>{if(e.target===modal)closeArticle()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeArticle()});
</script>
</body>
</html>
